<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pobre's Lanche | Cardápio</title>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #e4002b; /* Vermelho Bob's */
            --secondary: #ffcb05; /* Amarelo Bob's */
            --bg: #f9f9f9;
            --text: #2d2d2d;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            padding-bottom: 100px;
        }

        /* Estilo Bob's */
        .brand-font {
            font-family: 'Titan One', cursive;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header {
            background: var(--primary);
            color: var(--secondary);
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .logo { font-size: 28px; -webkit-text-stroke: 1px #fff; }

        .cart-icon { position: relative; cursor: pointer; font-size: 24px; color: #fff; }
        .badge {
            position: absolute; top: -8px; right: -10px;
            background: var(--secondary); color: var(--primary);
            font-size: 12px; padding: 2px 7px; border-radius: 50%; font-weight: bold;
        }

        main { padding: 20px 6%; max-width: 900px; margin: 0 auto; }
        .section-title { margin: 30px 0 15px; font-size: 24px; color: var(--primary); border-bottom: 3px solid var(--secondary); display: inline-block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .card {
            background: #fff; border-radius: 15px; padding: 15px;
            display: flex; gap: 15px; transition: 0.3s; cursor: pointer;
            border: 2px solid transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card:hover { border-color: var(--secondary); transform: translateY(-3px); }

        .card-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: #eee; }
        .card-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-body h3 { font-size: 17px; margin-bottom: 4px; color: var(--primary); }
        .price { color: #2e7d32; font-weight: 800; font-size: 16px; }

        /* Modais */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 2000;
            justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: #fff; width: 100%; max-width: 500px;
            border-radius: 25px 25px 0 0; padding: 25px;
            max-height: 85vh; overflow-y: auto;
        }

        .option-group { margin-bottom: 20px; }
        .option-group h4 { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .check-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 8px;
            cursor: pointer;
        }
        .check-item.active { border-color: var(--primary); background: #fff0f1; }

        .btn-confirm {
            width: 100%; padding: 15px; background: var(--primary); color: #fff;
            border: none; border-radius: 10px; font-weight: 700; font-size: 18px; cursor: pointer;
        }

        .floating-bar {
            position: fixed; bottom: 20px; left: 5%; right: 5%;
            background: var(--primary); color: #fff; padding: 15px 25px;
            border-radius: 50px; display: none; justify-content: space-between;
            align-items: center; font-weight: 700; box-shadow: 0 10px 25px rgba(228,0,43,0.4);
            cursor: pointer;
        }

        .cart-item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item-details { font-size: 13px; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo brand-font">Pobre's Lanche</div>
        <div class="cart-icon" onclick="openCart()">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="cart-count">0</span>
        </div>
    </header>

    <main id="menu-container"></main>

    <div class="floating-bar brand-font" id="floating-bar" onclick="openCart()">
        <span><i class="fas fa-bag-shopping"></i> Ver Sacola</span>
        <span id="float-total">R$ 0,00</span>
    </div>

    <div class="modal" id="options-modal">
        <div class="modal-content">
            <h2 id="opt-title" class="brand-font" style="color: var(--primary); margin-bottom: 15px;">Personalizar</h2>
            <div id="options-container"></div>
            <button class="btn-confirm brand-font" style="margin-top: 15px;" onclick="confirmAddition()">Adicionar ao Carrinho</button>
            <button onclick="closeModal('options-modal')" style="width:100%; background:none; border:none; margin-top:15px; color:#777; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <h2 class="brand-font" style="margin-bottom: 20px;">Minha Sacola</h2>
            <div id="cart-items-list"></div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px; font-weight: 800; font-size: 20px;">
                <span>Total</span>
                <span id="modal-total">R$ 0,00</span>
            </div>
            <button class="btn-confirm brand-font" style="background: #25D366; margin-top: 20px;" onclick="finishOrder()">Finalizar via WhatsApp</button>
            <button onclick="closeModal('cart-modal')" style="width:100%; background:none; border:none; margin-top:10px; color:#777; cursor:pointer;">Escolher mais lanches</button>
        </div>
    </div>

    <script>
        const WHATSAPP = "5581995437788";
        let cart = [];
        let currentItem = null;
        let selectedOptions = { flavor: '', extras: [] };

        const produtos = [
            { id: 1, cat: 'Pizzas', nome: 'Pizza Grande (G)', preco: 42.00, type: 'pizza', img: 'https://placehold.co/400?text=Pizza+G' },
            { id: 2, cat: 'Pizzas', nome: 'Pizza Média (M)', preco: 30.00, type: 'pizza', img: 'https://placehold.co/400?text=Pizza+M' },
            { id: 3, cat: 'Pizzas', nome: 'Pizza Pequena (P)', preco: 20.00, type: 'pizza', img: 'https://placehold.co/400?text=Pizza+P' },
            
            { id: 4, cat: 'Pastéis', nome: 'Pastel Especial', preco: 12.00, type: 'pastel', img: 'https://placehold.co/400?text=Pastel' },
            
            { id: 5, cat: 'Hambúrgueres', nome: 'Hambúrguer Simples', preco: 15.00, type: 'burger', img: 'https://placehold.co/400?text=Simples' },
            { id: 6, cat: 'Hambúrgueres', nome: 'Hambúrguer Duplo', preco: 20.00, type: 'burger', img: 'https://placehold.co/400?text=Duplo' },
            { id: 7, cat: 'Hambúrgueres', nome: 'X-Bacon', preco: 25.00, type: 'burger', img: 'https://placehold.co/400?text=X-Bacon' },
            { id: 8, cat: 'Hambúrgueres', nome: 'X-Salada', preco: 18.00, type: 'burger', img: 'https://placehold.co/400?text=X-Salada' },
            { id: 9, cat: 'Hambúrgueres', nome: 'X-Tudo', preco: 30.00, type: 'burger', img: 'https://placehold.co/400?text=X-Tudo' },

            { id: 10, cat: 'Bebidas', nome: 'Coca-Cola 350ml', preco: 6.00, type: 'drink', img: 'https://placehold.co/400?text=Coca' },
            { id: 11, cat: 'Bebidas', nome: 'Coca Zero 350ml', preco: 6.00, type: 'drink', img: 'https://placehold.co/400?text=Coca+Zero' },
            { id: 12, cat: 'Bebidas', nome: 'Fanta Laranja 350ml', preco: 6.00, type: 'drink', img: 'https://placehold.co/400?text=Fanta' }
        ];

        const SABORES_PIZZA = ['Calabresa', 'Mussarela', 'Frango com Catupiry', 'Portuguesa'];
        const SABORES_PASTEL = ['Frango', 'Carne', 'Frango c/ Catupiry', 'Carne c/ Catupiry', 'Pizza', '3 Queijos'];
        const EXTRAS_PASTEL = ['Azeitona', 'Milho', 'Cebola', 'Tomate', 'Uva Passa', 'Repolho'];
        const EXTRAS_BURGER = [
            {n: 'Carne extra', p: 5}, {n: 'Queijo extra', p: 3}, 
            {n: 'Cheddar', p: 5}, {n: 'Catupiry', p: 5}
        ];

        function renderMenu() {
            const container = document.getElementById('menu-container');
            const categorias = [...new Set(produtos.map(p => p.cat))];
            container.innerHTML = categorias.map(cat => `
                <h2 class="section-title brand-font">${cat}</h2>
                <div class="grid">
                    ${produtos.filter(p => p.cat === cat).map(p => `
                        <div class="card" onclick="startOrder(${p.id})">
                            <img src="${p.img}" class="card-img">
                            <div class="card-body">
                                <div>
                                    <h3 class="brand-font">${p.nome}</h3>
                                    <span class="price">R$ ${p.preco.toFixed(2)}</span>
                                </div>
                                <i class="fas fa-plus-circle" style="color: var(--primary); align-self: flex-end; font-size: 20px;"></i>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function startOrder(id) {
            const p = produtos.find(x => x.id === id);
            currentItem = { ...p };
            selectedOptions = { flavor: '', extras: [] };

            if(p.type === 'drink') {
                addToCart();
                return;
            }

            document.getElementById('opt-title').innerText = p.nome;
            let html = '';

            if(p.type === 'pizza' || p.type === 'pastel') {
                const lista = p.type === 'pizza' ? SABORES_PIZZA : SABORES_PASTEL;
                html += `<div class="option-group"><h4>Escolha o Sabor:</h4>`;
                lista.forEach(s => {
                    html += `<div class="check-item" onclick="setFlavor(this, '${s}')">${s} <i class="far fa-circle"></i></div>`;
                });
                html += `</div>`;
            }

            if(p.type === 'pastel') {
                html += `<div class="option-group"><h4>Adicionais (Grátis):</h4>`;
                EXTRAS_PASTEL.forEach(e => {
                    html += `<div class="check-item" onclick="toggleExtra(this, '${e}', 0)">${e} <i class="fas fa-plus"></i></div>`;
                });
                html += `</div>`;
            }

            if(p.type === 'burger') {
                html += `<div class="option-group"><h4>Adicionais Pagos:</h4>`;
                EXTRAS_BURGER.forEach(e => {
                    html += `<div class="check-item" onclick="toggleExtra(this, '${e.n}', ${e.p})">
                        ${e.n} (+R$ ${e.p}) <i class="fas fa-plus"></i>
                    </div>`;
                });
                html += `</div>`;
            }

            document.getElementById('options-container').innerHTML = html;
            document.getElementById('options-modal').style.display = 'flex';
        }

        function setFlavor(el, flavor) {
            Array.from(el.parentElement.children).forEach(c => {
                c.classList.remove('active');
                c.querySelector('i').className = 'far fa-circle';
            });
            el.classList.add('active');
            el.querySelector('i').className = 'fas fa-check-circle';
            selectedOptions.flavor = flavor;
        }

        function toggleExtra(el, name, price) {
            const index = selectedOptions.extras.findIndex(x => x.name === name);
            if(index > -1) {
                selectedOptions.extras.splice(index, 1);
                el.classList.remove('active');
            } else {
                selectedOptions.extras.push({name, price});
                el.classList.add('active');
            }
        }

        function confirmAddition() {
            if((currentItem.type === 'pizza' || currentItem.type === 'pastel') && !selectedOptions.flavor) {
                alert("Por favor, escolha um sabor!");
                return;
            }
            addToCart();
            closeModal('options-modal');
        }

        function addToCart() {
            const extraTotal = selectedOptions.extras.reduce((t, x) => t + x.price, 0);
            const itemFinal = {
                ...currentItem,
                customName: `${currentItem.nome} ${selectedOptions.flavor ? '('+selectedOptions.flavor+')' : ''}`,
                details: selectedOptions.extras.map(x => x.name).join(', '),
                precoFinal: currentItem.preco + extraTotal,
                qtd: 1
            };
            cart.push(itemFinal);
            updateUI();
        }

        function updateUI() {
            const count = cart.length;
            const total = cart.reduce((t, i) => t + i.precoFinal, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('floating-bar').style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('float-total').innerText = `R$ ${total.toFixed(2)}`;
            
            document.getElementById('cart-items-list').innerHTML = cart.map((i, idx) => `
                <div class="cart-item-row">
                    <div>
                        <strong>${i.customName}</strong><br>
                        <span class="item-details">${i.details || 'Sem adicionais'}</span>
                    </div>
                    <div style="text-align: right">
                        R$ ${i.precoFinal.toFixed(2)}<br>
                        <i class="fas fa-trash" onclick="removeItem(${idx})" style="color:red; cursor:pointer; font-size:12px"></i>
                    </div>
                </div>
            `).join('');
            document.getElementById('modal-total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            updateUI();
        }

        function openCart() { document.getElementById('cart-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function finishOrder() {
            if(cart.length === 0) return;
            const total = cart.reduce((t, i) => t + i.precoFinal, 0);
            let msg = `*NOVO PEDIDO - POBRE'S LANCHE*\n------------------------------\n`;
            
            cart.forEach(i => {
                msg += `• *${i.customName}*\n`;
                if(i.details) msg += `  _Extras: ${i.details}_\n`;
                msg += `  Preço: R$ ${i.precoFinal.toFixed(2)}\n\n`;
            });

            msg += `------------------------------\n*TOTAL: R$ ${total.toFixed(2)}*`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`);
        }

        renderMenu();
    </script>
</body>
</html>
